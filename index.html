  position: fixed;

  width: 48px;

  animation: pulse 1.5s infinite;

}

}

/* animasi */
@keyframes pulse {

    transform: scale(1);

  70% {
    transform: scale(1.08);
    box-shadow: 0 0 0 10px rgba(37, 211, 102, 0);
  }

  }

<body>

<header>
  <h1>CHOQZ SHOP</h1>
  <div class="sub">Top Up Game Murah, Aman & Legal</div>
  <div class="sub">Tersedia Free Fire & Mobile Legend</div>
</header>

<div class="container">

<h3>Populer Sekarang!</h3>

<div class="grid">

<div class="card" onclick="pilihGame('Free Fire')">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Garena_Free_Fire_Logo.svg">
<div>Free Fire<br><small>Garena</small></div>
</div>

<div class="card" onclick="pilihGame('Mobile Legends')">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Mobile_Legends_Bang_Bang_Logo.jpg">
<div>Mobile Legends<br><small>Moonton</small></div>
</div>

<div class="card" onclick="pilihGame('Genshin Impact')">
<img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg">
<div>Genshin Impact<br><small>HoYoverse</small></div>
</div>

<div class="card" onclick="pilihGame('Honor of Kings')">
<img src="https://i.ibb.co/6g3sZP8/hok.jpg">
<div>Honor of Kings<br><small>Tencent</small></div>
</div>
  
<div class="card" onclick="pilihGame('Magic Chess')">
<img src="https://i.ibb.co/tP8Cqg9/magic.jpg">
<div>Magic Chess<br><small>Vizta</small></div>
</div>

<div class="card" onclick="pilihGame('Roblox')">
<img src="https://i.ibb.co/5jT3f4T/roblox.jpg">
<div>Roblox<br><small>Roblox Corp</small></div>
</div>

</div>

<div class="form-box" id="formTopup" style="display:none;">
<h3 id="namaGame"></h3>

<input type="text" id="uid" placeholder="Masukkan UID">
  
<select id="item" onchange="hitungTotal()"></select>

<select id="pembayaran">
<option>DANA</option>
<option>OVO</option>
<option>GOPAY</option>
<option>QRIS</option>
</select>

<div class="total" id="total">Total: Rp0</div>

<button onclick="kirimWA()">ORDER SEKARANG</button>
</div>
  
  <div id="notif"></div>
</div>

</div>

<script>
let gameDipilih = "";
let hargaList = {};

function pilihGame(game) {
  gameDipilih = game;
  document.getElementById("formTopup").style.display = "block";
  document.getElementById("namaGame").innerText = game;

  let item = document.getElementById("item");
  item.innerHTML = "";

  if (game === "Free Fire") {
    hargaList = {"5 DM - Rp1.000":1000,"12 DM - Rp2.000":2000,"30 DM - Rp5.800":5800,"50 DM - Rp7.800":7800,"70 DM - Rp10.000":10000,"80 DM - Rp11.600":11600,"100 DM - Rp16.000":16000,"140 DM - Rp19.000":19000,"355 DM - Rp50.000":50000,"720 DM - Rp100.000":100000};
  }
  else if (game === "Mobile Legends") {
    hargaList = {"86 DM - Rp20.000":20000,"172 DM - Rp38.000":38000};
  }
  else if (game === "Genshin Impact") {
    hargaList = {"60 Crystal - Rp15.000":15000};
  }
  else if (game === "Roblox") {
    hargaList = {"80 Robux - Rp15.000":15000};
  }
  else {
    hargaList = {"Paket 1 - Rp10.000":10000};
  }

  for (let key in hargaList) {
    let opt = document.createElement("option");
    opt.value = key;
    opt.text = key;
    item.appendChild(opt);
  }

  hitungTotal();
}

function hitungTotal() {
  let item = document.getElementById("item").value;
  let harga = hargaList[item] || 0;
  document.getElementById("total").innerText = "Total: Rp" + harga.toLocaleString();
}

function kirimWA() {
  let uid = document.getElementById("uid").value;
  let item = document.getElementById("item").value;
  let bayar = document.getElementById("pembayaran").value;
  let total = document.getElementById("total").innerText;

  let text = `Halo ChoqzShop!
Saya ingin top up:

Game: ${gameDipilih}
UID: ${uid}
Item: ${item}
${total}
Pembayaran: ${bayar}`;

  window.open("https://wa.me/6283126088118?text=" + encodeURIComponent(text));
  
  document.getElementById("notif").innerHTML =
  "<div class='success'>✅ Order berhasil! ID: "+id+"</div>";

}

</script>

  <img src="https://cdn-icons-png.flaticon.com/512/220/220236.png">
</a>

</body>
